<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorize | Smart AI Encryption</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        (function () {
            const theme = localStorage.getItem('theme');
            if (theme === 'light') document.documentElement.classList.add('light-mode');
        })();
    </script>
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .auth-card {
            max-width: 480px;
            width: 100%;
            padding: 3.5rem;
            text-align: center;
        }
    </style>
</head>

<body class="body-auth">

    <button id="themeToggle" class="glass-card"
        style="position: fixed; top: 1.5rem; right: 1.5rem; padding: 0.75rem; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; transition: transform 0.3s ease;">
        <span id="themeIcon">🌙</span>
    </button>

    <div class="auth-container">
        <div class="glass-card auth-card animate-in">
            <div class="logo" style="justify-content: center; margin-bottom: 2rem; font-size: 1.5rem;">
                <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo-img" alt="Logo"
                    style="width: 50px; height: 50px;"> AI-Driven Sec
            </div>
            <div style="text-align: center; margin-bottom: 2rem;">
                <h2 class="text-gradient" style="font-size: 2.25rem; margin-bottom: 0.5rem;">Access Portal</h2>
                <p style="color: var(--text-muted); font-size: 0.9375rem;">Authenticate to access encryption assets.</p>
            </div>

            <form action="/login" method="post">
                <div class="input-group">
                    <input type="text" name="username" placeholder="Username" required>
                </div>
                <div class="input-group" style="position: relative;">
                    <input type="password" id="loginPassword" name="password" placeholder="Password" required style="padding-right: 3rem;">
                    <span id="toggleLoginPassword" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); opacity: 0.7; transition: 0.3s; display: flex;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/><circle cx="12" cy="12" r="3"/></svg>
                    </span>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 1rem;">
                    Authorize Access
                </button>
            </form>

            <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--glass-border);">
                <p style="font-size: 0.875rem; color: var(--text-muted);">
                    New Security User? <a href="/register"
                        style="color: var(--primary); text-decoration: none; font-weight: 600;">Create Credentials</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');

        function updateIcon() {
            const isLight = document.documentElement.classList.contains('light-mode');
            themeIcon.innerText = isLight ? '☀️' : '🌙';
        }

        updateIcon();

        themeToggle.addEventListener('click', () => {
            const isLight = document.documentElement.classList.toggle('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            updateIcon();
        });

        // Password Toggle Logic
        const togglePassword = document.getElementById('toggleLoginPassword');
        const passwordInput = document.getElementById('loginPassword');
        
        const eyeSvg = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/><circle cx="12" cy="12" r="3"/></svg>`;
        const eyeOffSvg = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88l-3.29-3.29m7.53 7.53l3.29 3.29M3 3l1.8 1.8m1.8 1.8l3.29 3.29m1.8 1.8l3.29 3.29m1.8 1.8L21 21M12 17a4.91 4.91 0 0 1-5-5 4.9 4.9 0 0 1 1.5-3.5M12 7a4.91 4.91 0 0 1 5 5 4.9 4.9 0 0 1-1.5 3.5"/><path d="M2.062 12.348a10.75 10.75 0 0 1 3.29-5.12m5.12-2.12a10.75 10.75 0 0 1 11.47 7.24 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-3.29 5.12m-5.12 2.12a10.75 10.75 0 0 1-11.47-7.24"/></svg>`;

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.innerHTML = type === 'password' ? eyeSvg : eyeOffSvg;
        });
    </script>

</body>

</html>
